<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Primate_voyages_interactive_figure_test</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin:0; padding:0; font-family:sans-serif; }
    #map { width: 100%; height: 600px; }
    #time { 
      width:100%; 
      text-align:center; 
      padding: 10px 0;
      font-size: 20px;
      font-weight: bold;
      background: #f4f4f4;
      border-top: 1px solid #ddd;
    }
    .info-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border-radius: 4px;
      max-width: 300px;
      z-index: 1000;
      font-size: 14px;
    }
    .nav-buttons { text-align:center; padding: 8px 0; }
    .nav-buttons button { font-size:16px; padding:5px 10px; margin:0 5px; }

  </style>
</head>
<body>

<div id="map"></div>
<div class="info-panel" id="info"></div>
<div id="time"></div>
<div class="nav-buttons">
  <button id="prevBtn">◀</button>
  <button id="nextBtn">▶</button>
</div>
<p style="font-size:20px; text-align:center"><b>Maps:</b> Scotese, C.R., 2016. PALEOMAP PaleoAtlas for GPlates and the PaleoData Plotter Program, PALEOMAP Project, http://www.earthbyte.org/paleomap-­‐paleoatlas-­‐for-­‐gplates/</div>
<p style="font-size:1; text-align:center; color:crimson">Still in progress. Check back later for updates.</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

var slides = [
  {
    map: "maps/Map16a_KT_Boundary_066.jpg",
    time: "66 Million Years Ago",
    fossils: [
      { name: "Where did primates first evolve?", x: 600, y: 200, info: "It is a question that has remained stubbornly difficult to answer. Decades of debate have seen the number of candidate continents drop to… four, “narrowing” the possibilities to most of the Northern Hemisphere (North America, Europe, and Asia) and Africa.Over the same period, outlandish hypotheses about primate evolution and dispersal, such as their voyage across the Atlantic on nothing but rafts of vegetation, have gained general attention.The first crown primates appear in the fossil record at the beginning of the Eocene, some 56 million years ago (Ma). But genetic data estimates primate origins at about 66 Ma, soon after, the mass extinction event that wiped out the non-avian dinosaurs. This leaves an almost 10-million-year gap in our knowledge of primate dispersals.For the very first stem primates, Asia has been favoured, as it happens to be where their closest living relatives (the colugos and tree shrews) are found today. But, as we will soon see, species distributions can fluctuate wildly over just a few million years. Modern primates are mostly restricted to the Southern Hemisphere, the opposite of their early fossil representatives. The same could be true for tree shrews and colugos.A recent modelling study found the greatest support for a North American origin (Avaria-Llautureo et al., 2025). However, without more fossil discoveries, this mystery is likely to endure a while longer." },
      { name: "Where did primates first evolve?", x: 1050, y: 275, info: "It is a question that has remained stubbornly difficult to answer. Decades of debate have seen the number of candidate continents drop to… four, “narrowing” the possibilities to most of the Northern Hemisphere (North America, Europe, and Asia) and Africa.Over the same period, outlandish hypotheses about primate evolution and dispersal, such as their voyage across the Atlantic on nothing but rafts of vegetation, have gained general attention.The first crown primates appear in the fossil record at the beginning of the Eocene, some 56 million years ago (Ma). But genetic data estimates primate origins at about 66 Ma, soon after, the mass extinction event that wiped out the non-avian dinosaurs. This leaves an almost 10-million-year gap in our knowledge of primate dispersals.For the very first stem primates, Asia has been favoured, as it happens to be where their closest living relatives (the colugos and tree shrews) are found today. But, as we will soon see, species distributions can fluctuate wildly over just a few million years. Modern primates are mostly restricted to the Southern Hemisphere, the opposite of their early fossil representatives. The same could be true for tree shrews and colugos.A recent modelling study found the greatest support for a North American origin (Avaria-Llautureo et al., 2025). However, without more fossil discoveries, this mystery is likely to endure a while longer." },
      { name: "Where did primates first evolve?", x: 1400, y: 250, info: "It is a question that has remained stubbornly difficult to answer. Decades of debate have seen the number of candidate continents drop to… four, “narrowing” the possibilities to most of the Northern Hemisphere (North America, Europe, and Asia) and Africa.Over the same period, outlandish hypotheses about primate evolution and dispersal, such as their voyage across the Atlantic on nothing but rafts of vegetation, have gained general attention.The first crown primates appear in the fossil record at the beginning of the Eocene, some 56 million years ago (Ma). But genetic data estimates primate origins at about 66 Ma, soon after, the mass extinction event that wiped out the non-avian dinosaurs. This leaves an almost 10-million-year gap in our knowledge of primate dispersals.For the very first stem primates, Asia has been favoured, as it happens to be where their closest living relatives (the colugos and tree shrews) are found today. But, as we will soon see, species distributions can fluctuate wildly over just a few million years. Modern primates are mostly restricted to the Southern Hemisphere, the opposite of their early fossil representatives. The same could be true for tree shrews and colugos.A recent modelling study found the greatest support for a North American origin (Avaria-Llautureo et al., 2025). However, without more fossil discoveries, this mystery is likely to endure a while longer."},
      { name: "Where did primates first evolve?", x: 975, y: 390, info: "It is a question that has remained stubbornly difficult to answer. Decades of debate have seen the number of candidate continents drop to… four, “narrowing” the possibilities to most of the Northern Hemisphere (North America, Europe, and Asia) and Africa.Over the same period, outlandish hypotheses about primate evolution and dispersal, such as their voyage across the Atlantic on nothing but rafts of vegetation, have gained general attention.The first crown primates appear in the fossil record at the beginning of the Eocene, some 56 million years ago (Ma). But genetic data estimates primate origins at about 66 Ma, soon after, the mass extinction event that wiped out the non-avian dinosaurs. This leaves an almost 10-million-year gap in our knowledge of primate dispersals.For the very first stem primates, Asia has been favoured, as it happens to be where their closest living relatives (the colugos and tree shrews) are found today. But, as we will soon see, species distributions can fluctuate wildly over just a few million years. Modern primates are mostly restricted to the Southern Hemisphere, the opposite of their early fossil representatives. The same could be true for tree shrews and colugos.A recent modelling study found the greatest support for a North American origin (Avaria-Llautureo et al., 2025). However, without more fossil discoveries, this mystery is likely to endure a while longer." }
    ]
  },
  // {
  //   map: "Map15a Paleocene_060.jpg",
  //   time: "60 Million Years Ago",
  // },
  // {
  //   map: "Map14a PETM_055.jpg",
  //   time: "55 Million Years Ago",
  // },
  // {
  //   map: "Map13a Early Eocene_050.jpg",
  //   time: "50 Million Years Ago",
  // },
  // {
  //   map: "Map12a early Middle Eocene_045.jpg",
  //   time: "45 Million Years Ago",
  // },

  {
    map: "maps/Map11a MIddle Eocene_040.jpg",
    time: "40 Million Years Ago",
    fossils: [
      { name: "The first voyage", x: 1100, y: 350, info: "In the mid Eocene a group of primates known as anthropoids (the ancestors of monkeys, apes, and humans), suddenly begin to appear in Africa where before they had only occurred in the Northern continents. This may seem unremarkable at first, until one realises that at the time of that transition, Africa was separated from Europe and Asia by a now extinct sea known as the Tethys. Estimates for how large this separation was differ between models, but range between 500-2000 km. For reference, the maximum width (North to South) of the Mediterranean today is 1600 km. How did our primate ancestors cross this sea to reach Africa? Scientists think they most likely rafted across, carried on flotillas of vegetation stripped from riverbanks during heavy floods. Torn from their home and cast adrift, the fossils that appear on the African mainland are a testament to their tale of survival. Once in Africa, anthropoids found remarkable success, but it appears as if this was just a stepping stone. Primates would traverse oceans again at least twice before our species emerged. And one would be a feat so impressive we did not match it until the end of the medieval period." },
      { name: "True pioneers", x: 800, y: 600, info: "Living monkeys can be split into two main groups based on their worldly distribution. There are the new world monkeys and the old world monkeys. Divided by the Atlantic Ocean, it was thought that these two groups must have split off from one another at the same time South America and Africa divided. However, this would have been deep in the Cretaceous, when dinosaurs still ruled, and we know from genetic evidence that the split actually occurred roughly 40 million years ago. By that time, South America was not as far from Africa as it was today (it was about 1/3 closer), however there would have still been an entire ocean separating them. And whilst, there is evidence of island chains stretching out into the Atlantic, the closest was still some 800 km from the SA coast. And in fact, a recent paper concludes that island hopping was actually less likely than the alternative (Montheil et al., 2026). This alternative being yet another feat of ocean survival and traversal by our ancient primate relatives. Once again, scientists believe the frequent monsoons that assailed the coastline of West Africa at the time, may have dislodged a section of a riverbank, sweeping it and any unfortunate animals that may have been upon it, out into the open ocean. Yet even faced with a journey of 2000 km it seems at least one, or maybe, several voyages, made successful landfall. How strange it must have been for those ancient primates, finding themselves on a continent populated by giant sloths and armadillos, mammals that had been completely isolated from the rest of the world for many tens of millions of years" }
    ]
  },
  // {
  //   map: "Map10a Late Eocene_035.jpg",
  //   time: "35 Million Years Ago",
  // },
  // {
  //   map: "Map9a  Early Oligocene_030.jpg",
  //   time: "30 Million Years Ago",
  // },
  // {
  //   map: "Map8a Late Oligocene_025.jpg",
  //   time: "25 Million Years Ago",
  // },
  {
    map: "maps/Map7a  Early Miocene_020.jpg",
    time: "20 Million Years Ago",
    fossils: [
      { name: "", x: 0, y: 0, info: "" },
      { name: "", x: 0, y: 0, info: "" }
    ]
  }
];

var w = 2000;
var h = 1000;
var ZOOM = 0;

var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4,
  zoomSnap: 0.1
});

var southWest = map.unproject([0, h], ZOOM);
var northEast = map.unproject([w, 0], ZOOM);
var bounds = new L.LatLngBounds(southWest, northEast);
map.fitBounds(bounds);

var currentMap = null;
var currentMarkers = [];
var currentSlide = 0;

function showSlide(index) {
  var slide = slides[index];

  if (currentMap) map.removeLayer(currentMap);
  currentMap = L.imageOverlay(slide.map, bounds).addTo(map);

  currentMarkers.forEach(m => map.removeLayer(m));
  currentMarkers = [];

  slide.fossils.forEach(function(fossil) {
    var latlng = map.unproject([fossil.x, fossil.y], ZOOM);
    var marker = L.circleMarker(latlng, {
      radius: 8,
      fillColor: "#E63946",
      color: "#ffffff",
      weight: 2,
      fillOpacity: 0.9
    }).addTo(map);

    marker.on('click', function() {
      document.getElementById('info').innerHTML =
        "<b>" + fossil.name + "</b><br>" + fossil.info;
    });

    currentMarkers.push(marker);
  });

  document.getElementById('time').innerHTML = slide.time;
  document.getElementById('info').innerHTML = "";
}

document.getElementById('prevBtn').addEventListener('click', function() {
  if (currentSlide > 0) { currentSlide--; showSlide(currentSlide); }
});
document.getElementById('nextBtn').addEventListener('click', function() {
  if (currentSlide < slides.length - 1) { currentSlide++; showSlide(currentSlide); }
});

showSlide(0);

</script>
</body>
</html>
